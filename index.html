<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>พรรคเพื่อไทย | Pheu Thai Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root/* สีแดงพรรคเพื่อไทย และสี Tinted Neutrals เพื่อความนุ่มนวล */
            --ptp-red: oklch(55% 0.22 25);
            --ptp-red-dark: oklch(45% 0.20 25);
            --surface: oklch(99% 0.01 25);
            --gray-900: oklch(15% 0.01 25);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1); /* */
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Kanit', sans-serif;
            background-color: var(--surface);
            color: var(--gray-900);
            line-height: 1.6; /* */
        }

        .btn-primary {
            background-color: var(--ptp-red);
            transition: all 0.3s var(--ease-out-expo);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-2px); /* */
        }

        .btn-primary:active {
            transform: scale(0.95); /* */
        }

        /* Responsive Grid: ปรับขนาดอัตโนมัติตาม container */
        .policy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem; /* 24px (4pt scale) */
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; } /* */
        }
        {
            --ptp-red: oklch(55% 0.22 25);
            --surface: oklch(99% 0.01 25);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }
        body { font-family: 'Plus Jakarta Sans', 'Kanit', sans-serif; background-color: var(--surface); overflow-x: hidden; }

        /* ระบบเมนูแบบในวิดีโอ */
        #mobile-menu {
            transform: translateX(-100%);
            transition: transform 0.4s var(--ease-out-expo);
        }
        #mobile-menu.active { transform: translateX(0); }

        .menu-item {
            border-bottom: 1px solid oklch(90% 0.01 25);
            transition: background-color 0.2s;
        }
        
        /* สัญลักษณ์ลูกศรหมุนเมื่อเปิดแท็บ */
        .chevron { transition: transform 0.3s; }
        .dropdown-active .chevron { transform: rotate(180deg); }

        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s var(--ease-out-expo);
            background-color: oklch(97% 0.01 25);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100 h-16 flex items-center px-6">
        <button id="menu-toggle" class="p-2 -ml-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
        <div class="ml-4 text-xl font-bold tracking-tighter text-[var(--ptp-red)]">PHEU THAI</div>
    </nav>

    <div id="menu-overlay" class="fixed inset-0 bg-black/50 z-[60] hidden opacity-0 transition-opacity duration-300"></div>

    <aside id="mobile-menu" class="fixed top-0 left-0 w-[85%] max-w-[320px] h-full bg-[#333] text-white z-[70] overflow-y-auto">
        <div class="p-6 border-b border-white/10 flex justify-between items-center bg-[#222]">
            <span class="font-bold">เมนูหลัก</span>
            <button id="menu-close" class="text-white/60">✕</button>
        </div>

        <nav class="flex flex-col">
            <a href="#" class="menu-item p-4 hover:bg-white/5 font-medium">หน้าแรก</a>
            
            <div>
                <button class="dropdown-btn w-full p-4 flex justify-between items-center menu-item hover:bg-white/5">
                    <span>เกี่ยวกับพรรค</span>
                    <svg class="chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div class="dropdown-content">
                    <a href="#" class="block p-4 pl-8 text-sm text-gray-300 hover:text-white">ประวัติพรรค</a>
                    <a href="#" class="block p-4 pl-8 text-sm text-gray-300 hover:text-white">คณะกรรมการบริหาร</a>
                </div>
            </div>

            <div>
                <button class="dropdown-btn w-full p-4 flex justify-between items-center menu-item hover:bg-white/5">
                    <span>การมีส่วนร่วม</span>
                    <svg class="chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div class="dropdown-content">
                    <a href="#" class="block p-4 pl-8 text-sm text-gray-300 hover:text-white">อาสาสมัคร</a>
                    <a href="#" class="block p-4 pl-8 text-sm text-gray-300 hover:text-white">ร่วมกิจกรรมพรรค</a>
                </div>
            </div>

            <a href="#news" class="menu-item p-4 hover:bg-white/5">ข่าวสารล่าสุด</a>
            <a href="#" class="menu-item p-4 hover:bg-white/5 text-[var(--ptp-red)] font-bold">บริจาค</a>
        </nav>
    </aside>

    <main class="p-6">
        <div class="rounded-2xl overflow-hidden shadow-lg mb-8">
            <img src="https://images.unsplash.com/photo-1540910419892-4a36d2c3266c?auto=format&fit=crop&q=80&w=800" alt="Hero" class="w-full aspect-video object-cover">
        </div>
        
        <h2 class="text-2xl font-bold mb-6">สถานการณ์ประชาชน</h2>
        <div class="space-y-6">
            <div class="border-b border-gray-100 pb-4">
                <h3 class="font-bold text-gray-800">ขอเชิญชวนสมาชิกรับหนังสือพิมพ์ได้ตั้งแต่วันนี้</h3>
                <p class="text-xs text-gray-400 mt-1">5 เมษายน 2569</p>
            </div>
            <div class="border-b border-gray-100 pb-4">
                <h3 class="font-bold text-gray-800">สายน้ำไม่คอยใคร: แก้ปัญหาน้ำอย่างยั่งยืน</h3>
                <p class="text-xs text-gray-400 mt-1">3 เมษายน 2569</p>
            </div>
        </div>
    </main>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const menuClose = document.getElementById('menu-close');
        const mobileMenu = document.getElementById('mobile-menu');
        const overlay = document.getElementById('menu-overlay');

        // เปิด-ปิดเมนูหลัก
        function toggleMenu() {
            mobileMenu.classList.toggle('active');
            overlay.classList.toggle('hidden');
            setTimeout(() => overlay.classList.toggle('opacity-0'), 10);
        }

        menuToggle.addEventListener('click', toggleMenu);
        menuClose.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // ระบบ Dropdown ภายในเมนู (Accordion)
        document.querySelectorAll('.dropdown-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const content = btn.nextElementSibling;
                const parent = btn.parentElement;
                
                // สลับสถานะเปิด/ปิด
                parent.classList.toggle('dropdown-active');
                
                if (parent.classList.contains('dropdown-active')) {
                    content.style.maxHeight = content.scrollHeight + "px";
                } else {
                    content.style.maxHeight = "0";
                }
            });
        });
    </script>
    <div>

        <div class="max-w-7xl mx-auto pt-8 border-t border-gray-800 text-center text-xs text-gray-500">
            &copy; 2026 พรรคเพื่อไทย
        </div>
    </footer>

</body>
</html>
